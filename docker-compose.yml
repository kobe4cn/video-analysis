version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: video-analysis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: video-analysis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── 数据库初始化（首次启动时执行） ───
  # docker compose --profile init run db-migrate
  db-migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: video-analysis-db-migrate
    working_dir: /app
    command: >
      sh -c "npx prisma db push --schema=prisma/schema.prisma --skip-generate &&
             npx tsx prisma/seed.ts"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_analysis?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - init

  # ─── 后端服务 ───
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: video-analysis-server
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_analysis?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── 前端服务 ───
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: video-analysis-web
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
