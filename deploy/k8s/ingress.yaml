apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: video-analysis-ingress
  namespace: video-analysis
  annotations:
    # 阿里云 ACK Nginx Ingress Controller
    kubernetes.io/ingress.class: nginx
    # 视频上传需要较大的 body 限制
    nginx.ingress.kubernetes.io/proxy-body-size: "5g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # WebSocket 支持（用于任务进度实时推送）
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # 如需 HTTPS，取消注释以下行并配置 TLS
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  # 取消注释并替换为实际证书 Secret 名称以启用 HTTPS
  # tls:
  #   - hosts:
  #       - your-domain.com
  #     secretName: your-tls-secret
  rules:
    # 替换为实际域名
    - host: your-domain.com
      http:
        paths:
          # 后端 API 和 WebSocket
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 3001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 3001
          # 健康检查端点（不经过 /api 前缀）
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: server-service
                port:
                  number: 3001
          # 前端页面（放在最后作为默认路由）
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 3000
