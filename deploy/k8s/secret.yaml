# 敏感信息模板，部署前需替换 base64 编码后的真实值
# echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: video-analysis-secret
  namespace: video-analysis
type: Opaque
data:
  # postgresql://user:pass@host:5432/dbname?schema=public
  DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  JWT_REFRESH_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"
